<ui:composition xmlns="http://www.w3.org/1999/xhtml"
   xmlns:ui="http://java.sun.com/jsf/facelets"
   xmlns:f="http://java.sun.com/jsf/core"
   xmlns:p="http://primefaces.org/ui"
   xmlns:h="http://java.sun.com/jsf/html">
      
   <p:outputPanel id="manage-product-content" class="ui-fluid">
                <p:outputPanel>
                    <div class="field">
                        <p:outputLabel for="name">Name</p:outputLabel>
                        <p:inputText id="name" value="#{dynTab.cdiBean.productData.name}" required="true" />
                    </div>
                    <div class="field">
                        <p:outputLabel for="description">Description</p:outputLabel>
                        <p:inputTextarea id="description" value="#{dynTab.cdiBean.productData.description}" />
                    </div>
                    <div class="field">
                        <p:outputLabel for="category">Category</p:outputLabel>
                        <p:selectOneRadio id="category" value="#{dynTab.cdiBean.productData.category}"
                            layout="responsive" columns="2">
                            <f:selectItem itemLabel="Accessories" itemValue="Accessories" />
                            <f:selectItem itemLabel="Clothing" itemValue="Clothing" />
                            <f:selectItem itemLabel="Electronics" itemValue="Electronics" />
                            <f:selectItem itemLabel="Fitness" itemValue="Fitness" />
                        </p:selectOneRadio>
                    </div>
                    <div class="formgrid grid">
                        <div class="field col">
                            <p:outputLabel for="price">Price</p:outputLabel>
                            <p:inputNumber id="price" value="#{dynTab.cdiBean.productData.price}" symbol=" USD"
                                symbolPosition="s" decimalSeparator="." thousandSeparator="," />
                        </div>
                        <div class="field col">
                            <p:outputLabel for="quantity">Quantity</p:outputLabel>
                            <p:spinner id="quantity" min="0" value="#{dynTab.cdiBean.productData.quantity}" />
                        </div>
                    </div>
                </p:outputPanel>
            </p:outputPanel>      
</ui:composition>
