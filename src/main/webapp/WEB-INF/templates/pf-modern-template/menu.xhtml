<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui">

    <!--
        NAVIGATION OPTIONS
        ==================
        Items below use plain <a href> links so this template works standalone.
        For JSF navigation, swap the <a> for one of these (keep the menu-link /
        menu-icon / menu-label classes so styling is preserved):

          • h:link        — plain view navigation between .xhtml pages:
              <h:link outcome="/page" styleClass="menu-link"> ... </h:link>

          • p:commandLink — action-based navigation (dynamic tabs / shell handler).
              Wrap the whole menu in one <h:form id="menuForm"> and add
              xmlns:p="http://primefaces.org/ui" to the composition above:

              <p:commandLink action="uishell:Home" process="@this" immediate="true"
                             styleClass="menu-link">
                  <i class="pi pi-home menu-icon" />
                  <span class="menu-label">Home</span>
              </p:commandLink>

        Note: p:menuitem cannot be used here directly — it must live inside a
        p:menu / p:menubar, which would replace this sidebar's styling with the
        PrimeFaces theme. See doc/installation-guide.md (Step 5).
        
        
        
    -->

    <nav class="layout-sidebar" aria-label="Main navigation">
        <div class="sidebar-menu">
            <h:form id="menuForm">

            <!-- Group: Main -->
            <div class="menu-group">
                <span class="menu-group-label">Main</span>
                <ul class="menu-list" role="list">
                    <li>
                           <p:commandLink action="uishell:Proizvodi" process="@this"   immediate="true"  styleClass="menu-link">
                              <span class="menu-label">Products</span>
                           </p:commandLink>
                    </li>
                    <li>
                           <p:commandLink action="uishell:DiscountedProducts" process="@this"   immediate="true"  styleClass="menu-link">
                              <span class="menu-label">Discounted Products</span>
                           </p:commandLink>
                    </li>
                    <li>
                           <p:commandLink action="uishell:ProductsCrud" process="@this"   immediate="true"  styleClass="menu-link">
                                <span class="menu-label">Products Crud</span>
                           </p:commandLink>
                    </li>
                    <li>       
                           <p:commandLink action="uishell:EasyAIDemo" process="@this"   immediate="true"  styleClass="menu-link">
                             <span class="menu-label">EasyAI Demo</span>
                           </p:commandLink>
                    </li>
                </ul>
            </div>

            <!-- Group: UI (Phase 6 — demo pages will extend this) 
            <div class="menu-group">
                <span class="menu-group-label">Components</span>
                <ul class="menu-list" role="list">
                    <li>
                        <a href="#" class="menu-link">
                            <i class="pi pi-table menu-icon" />
                            <span class="menu-label">Data Table</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="menu-link">
                            <i class="pi pi-id-card menu-icon" />
                            <span class="menu-label">Form</span>
                        </a>
                    </li>
                </ul>
            </div>
                -->
            <!-- Group: AI (Phase 4) -->
            <div class="menu-group">
                <span class="menu-group-label">AI</span>
                <ul class="menu-list" role="list">
                    <li>
                        <a href="#" class="menu-link" onclick="PFTemplate.toggleAiPanel(); return false;">
                            <i class="pi pi-sparkles menu-icon" />
                            <span class="menu-label">AI Assistant</span>
                        </a>
                    </li>
                </ul>
            </div>
            </h:form>
        </div>
    </nav>

</ui:composition>
